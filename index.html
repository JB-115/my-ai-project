<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSE 조선소 Dual-AI 결재 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4 font-sans">

    <div class="max-w-6xl mx-auto">
        <!-- 헤더 -->
        <header class="border-b border-gray-800 pb-4 mb-6 text-center">
            <h1 class="text-2xl font-bold text-yellow-500 tracking-wider">🚢 조선소 최고안전책임자(CSO) 결재 시스템</h1>
            <p class="text-xs text-gray-400 mt-1">iPad Chrome 최적화 자동 로그인 버전</p>
        </header>

        <!-- API 키 설정 공간 -->
        <section class="bg-gray-800 p-4 rounded-xl mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm mb-3">
                <div>
                    <label class="block text-gray-400 mb-1">Claude API Key</label>
                    <input type="password" id="claudeKey" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white" placeholder="sk-ant-...">
                </div>
                <div>
                    <label class="block text-gray-400 mb-1">Gemini API Key</label>
                    <input type="password" id="geminiKey" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white" placeholder="AIzaSy...">
                </div>
            </div>
            <button onclick="saveKeysToBrowser()" class="w-full bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs py-2 px-4 rounded transition">
                🔑 출입증(API 키) 크롬 브라우저에 안전하게 기억하기 (자동 로그인 효과)
            </button>
        </section>

        <!-- 작업 계획 입력 공간 -->
        <section class="bg-gray-800 p-5 rounded-xl mb-6">
            <label class="block text-lg font-medium text-gray-200 mb-2">🚧 현장 작업 내용 및 계획서 입력</label>
            <textarea id="workPlan" rows="4" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white placeholder-gray-500 focus:outline-none focus:border-yellow-500" placeholder="예시: 안벽 2번 마르스 크레인 구역 하부 고소 용접 작업 진행 및 양중 작업 간섭 우려 존재."></textarea>
            <button onclick="startDualAudit()" id="runBtn" class="w-full mt-3 bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 px-4 rounded-lg transition tracking-wide">
                ⚡ Dual-AI 교차 검증 및 최종 심사 시작
            </button>
        </section>

        <!-- AI 결과 출력 레이아웃 (반반 분할) -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 왼쪽: Claude 법리 분석 -->
            <div class="bg-gray-800 p-5 rounded-xl border border-blue-900">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-md font-bold text-blue-400">⚖️ 1차 Claude 법리 검토</h2>
                    <span id="claudeStatus" class="text-xs bg-gray-700 px-2 py-1 rounded text-gray-400">대기 중</span>
                </div>
                <div id="claudeOutput" class="bg-gray-900 p-4 rounded-lg text-sm min-h-[300px] whitespace-pre-wrap overflow-y-auto border border-gray-700">작업 계획을 입력하고 심사를 시작해 주세요.</div>
            </div>

            <!-- 오른쪽: Gemini 최종 승인 -->
            <div class="bg-gray-800 p-5 rounded-xl border border-red-900">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-md font-bold text-red-400">🛡️ 최종 Gemini CSO 결재</h2>
                    <span id="geminiStatus" class="text-xs bg-gray-700 px-2 py-1 rounded text-gray-400">대기 중</span>
                </div>
                <div id="geminiOutput" class="bg-gray-900 p-4 rounded-lg text-sm min-h-[300px] whitespace-pre-wrap overflow-y-auto border border-gray-700">최고안전책임자(CSO) 결재 시스템 가동 완료.</div>
            </div>
        </div>
    </div>

    <script>
        const claudePromptSystem = `당신은 산업안전보건(HSE) 전문 어시스턴트입니다. 한국 산업안전보건법 체계와 주요 국제 규격(OSHA, ILO, ISO 45001 등)에 정통하며 대형 조선소 안벽 및 도크 현장의 리스크를 통제하는 CSO의 직관을 가졌습니다. 답변은 반드시 국가법령정보센터, 고용노동부, KOSHA 등 공식 출처에 근거해 조항을 명시하십시오. 입력된 작업 위험성을 분석하여 [현장 실무 포맷](1.최종결재, 2.법적근거, 3.핵심위험 3가지, 4.현장조치지시 3가지, 5.TBM 표준문구)으로 출력하세요.`;
        const geminiPromptSystem = `당신은 대형 조선소의 최고안전책임자(CSO)이자 최종 작업 승인권자입니다. 클로드의 법리 분석 결과를 기반으로 현장의 안전 무결성을 최종 심사하고 APPROVED 또는 REJECTED를 단호하게 결정하세요. 출력 양식은 반드시 [■ 최종 결재, ■ 결재 이유, ■ 현장 즉시 조치 지시사항 3가지, ■ 안전 부적합 지적 및 TBM용 표준 문구] 양식을 준수하십시오.`;

        // [핵심] 페이지가 열릴 때 크롬에 저장된 키가 있다면 자동으로 불러오는 로직
        window.onload = function() {
            const savedClaude = localStorage.getItem('c_key');
            const savedGemini = localStorage.getItem('g_key');
            if (savedClaude) document.getElementById('claudeKey').value = savedClaude;
            if (savedGemini) document.getElementById('geminiKey').value = savedGemini;
        }

        // [핵심] 입력한 키를 브라우저에 저장하는 로직
        function saveKeysToBrowser() {
            const cKey = document.getElementById('claudeKey').value;
            const gKey = document.getElementById('geminiKey').value;
            localStorage.setItem('c_key', cKey);
            localStorage.setItem('g_key', gKey);
            alert("🔒 출입증이 크롬에 안전하게 기억되었습니다! 다음 접속부터는 입력하지 않으셔도 됩니다.");
        }

        async function startDualAudit() {
            const cKey = document.getElementById('claudeKey').value;
            const gKey = document.getElementById('geminiKey').value;
            const plan = document.getElementById('workPlan').value;

            if(!cKey || !gKey || !plan) {
                alert("API 키와 작업 계획을 모두 입력해주세요!");
                return;
            }

            document.getElementById('runBtn').innerText = "⏳ 1차 법리 검토 중 (Claude)...";
            document.getElementById('claudeStatus').innerText = "분석 중";

            try {
                const claudeResponse = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': cKey,
                        'anthropic-version': '2023-06-01',
                        'dangerously-allow-browser': 'true'
                    },
                    body: JSON.stringify({
                        model: "claude-3-5-sonnet-20241022",
                        max_tokens: 1500,
                        system: claudePromptSystem,
                        messages: [{ role: "user", content: plan }]
                    })
                });
                const cData = await claudeResponse.json();
                const claudeText = cData.content[0].text;
                
                document.getElementById('claudeOutput').innerText = claudeText;
                document.getElementById('claudeStatus').innerText = "완료";
                
                document.getElementById('runBtn').innerText = "⏳ 최종 안벽/도크 리스크 심사 중 (Gemini)...";
                document.getElementById('geminiStatus').innerText = "심사 중";

                const geminiResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${gKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `${geminiPromptSystem}\n\n[클로드의 1차 분석 결과]\n${claudeText}\n\n위 분석을 바탕으로 최종 결재를 진행하라.` }]
                        }]
                    })
                });
                const gData = await geminiResponse.json();
                const geminiText = gData.candidates[0].content.parts[0].text;

                document.getElementById('geminiOutput').innerText = geminiText;
                document.getElementById('geminiStatus').innerText = "결재 완료";
                document.getElementById('runBtn').innerText = "⚡ 심사 완료";

            } catch (error) {
                alert("오류가 발생했습니다. 키를 확인해 주세요.");
                document.getElementById('runBtn').innerText = "⚡ Dual-AI 교차 검증 및 최종 심사 시작";
            }
        }
    </script>
</body>
</html>
